# Base UNet

# Model name
name: unet

# I/O
out_channels: ${out_channels}

# Encoder
encoder: resnet34

# Depth
n_skip: 4

# Bottleneck
hidden_layers: 512
head_channels: 512

# Decoder
decoder_channels: [256, 128, 64, 16]
skip_channels: [256, 128, 64, 64]

# Segmentation head
segmentation_head:
  kernel_size: 3
  upsampling: 2

# Pretrained ckpt
pretrained_ckpt: null